<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEN — 農家の情熱を、食卓に。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="data/categories.js"></script>
<script src="data/farmers.js"></script>
<script src="data/products.js"></script>
<style>
/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#05100A;color:#EAE4D6;font-family:'Noto Serif JP',serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
ul,ol{list-style:none}

/* ══ TOKENS ══ */
:root{
  --hero-bg:#05100A;
  --dark:#0D1A0F;
  --dark2:#152018;
  --light-bg:#F5F0E8;
  --cream:#EDE8DF;
  --bd:rgba(255,255,255,.08);
  --bdl:#DDD8CE;
  --text-hero:#EAE4D6;
  --text-sub:rgba(234,228,214,.55);
  --text-body:#1C1916;
  --text-muted:#6A6058;
  --gold:#C49A30;
  --gold2:#A87820;
  --berry:#A32C40;
  --f-serif:'Noto Serif JP',serif;
  --f-sans:'Noto Sans JP',sans-serif;
  --f-label:'EB Garamond',serif;
  --nav-h:72px;
  --ease:cubic-bezier(.25,.46,.45,.94);
}

/* ══ LOADER ══ */
#loader{
  position:fixed;inset:0;z-index:9999;background:var(--hero-bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .9s,visibility .9s;
}
#loader.out{opacity:0;visibility:hidden;pointer-events:none}
.loader-content{text-align:center}
.loader-brand{
  font-family:var(--f-label);font-size:2.4rem;letter-spacing:.2em;color:var(--gold);margin-bottom:6px;
}
.loader-brand sup{font-size:.5em;vertical-align:super}
.loader-sub{font-size:.58rem;letter-spacing:.38em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:32px}
.loader-spinner svg{animation:spin 1.2s linear infinite;transform-origin:center}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-credit{
  position:absolute;bottom:24px;right:24px;
  font-family:var(--f-label);font-size:.6rem;letter-spacing:.15em;color:rgba(255,255,255,.2);
  writing-mode:vertical-rl;
}

/* ══ GRAIN ══ */
.grain{
  position:fixed;inset:-50%;width:200%;height:200%;pointer-events:none;z-index:9998;
  opacity:.04;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  animation:grain .18s steps(1) infinite;
}
@keyframes grain{0%{transform:translate(0,0)}20%{transform:translate(-3%,2%)}40%{transform:translate(3%,-2%)}60%{transform:translate(-2%,-3%)}80%{transform:translate(2%,3%)}100%{transform:translate(0,0)}}

/* ══ NAV ══ */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  transition:background .5s,border-color .5s;border-bottom:1px solid transparent;
}
#nav.solid{background:rgba(5,16,10,.95);backdrop-filter:blur(20px);border-color:var(--bd)}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-brand-name{font-family:var(--f-label);font-size:1.4rem;letter-spacing:.12em;color:#fff}
.nav-brand-name sup{font-size:.5em;vertical-align:super}
/* center links: absolute centered */
.nav-center{
  display:flex;gap:32px;align-items:center;
  position:absolute;left:50%;transform:translateX(-50%);
  white-space:nowrap;
}
.nav-center>li>a{
  font-family:var(--f-sans);font-size:.76rem;letter-spacing:.08em;
  color:rgba(255,255,255,.6);padding:4px 0;
  border-bottom:1px solid transparent;
  transition:color .2s,border-color .2s;
}
.nav-center>li>a:hover{color:#fff;border-color:var(--gold)}
/* dropdown */
.has-drop{position:relative}
.drop{
  position:absolute;top:calc(100% + 20px);left:50%;
  transform:translateX(-50%) translateY(-8px);
  min-width:290px;background:rgba(13,26,15,.98);border:1px solid var(--bd);
  border-radius:4px;padding:12px;
  opacity:0;visibility:hidden;
  transition:opacity .25s,visibility .25s,transform .25s;
}
.has-drop:hover .drop{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.drop-item{
  display:flex;gap:14px;align-items:center;
  padding:10px 14px;border-radius:3px;color:#fff;transition:background .2s;
}
.drop-item:hover{background:rgba(255,255,255,.06)}
.drop-thumb{
  width:44px;height:44px;border-radius:3px;flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.drop-thumb svg{width:36px;height:36px}
.drop-item strong{display:block;font-family:var(--f-serif);font-size:.86rem;font-weight:700}
.drop-item em{display:block;font-size:.65rem;color:rgba(255,255,255,.42);font-style:normal;margin-top:2px}
.drop-more{padding:8px 14px;font-family:var(--f-label);font-size:.7rem;color:rgba(255,255,255,.28);font-style:italic}
/* right */
.nav-right{display:flex;align-items:center;gap:14px}
.nav-cart{
  position:relative;display:flex;align-items:center;gap:7px;
  font-family:var(--f-sans);font-size:.72rem;letter-spacing:.06em;
  color:rgba(255,255,255,.6);transition:color .2s;
  padding:6px 0;
}
.nav-cart:hover{color:var(--gold)}
#cart-badge{
  position:absolute;top:-6px;right:-8px;
  width:16px;height:16px;border-radius:50%;background:var(--berry);
  color:#fff;font-size:.55rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transform:scale(0);transition:transform .3s var(--ease);
}
#cart-badge.vis{transform:scale(1)}
#cart-badge.bump{animation:cbump .35s var(--ease)}
@keyframes cbump{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}
.nav-cta-btn{
  padding:8px 20px;border:1px solid rgba(255,255,255,.28);border-radius:2px;
  font-family:var(--f-sans);font-size:.74rem;letter-spacing:.1em;
  color:rgba(255,255,255,.72);transition:border-color .2s,color .2s,background .2s;
}
.nav-cta-btn:hover{border-color:var(--gold);color:var(--gold)}
/* hamburger */
.nav-hamburger{display:none;flex-direction:column;gap:5px;padding:8px}
.nav-hamburger span{display:block;width:22px;height:1px;background:#fff;transition:transform .3s,opacity .3s}
#mobile-menu{
  display:none;position:fixed;inset:0;top:var(--nav-h);z-index:190;
  background:rgba(5,16,10,.97);padding:32px;
  flex-direction:column;gap:24px;
}
#mobile-menu.open{display:flex}
#mobile-menu a{font-family:var(--f-sans);font-size:1rem;letter-spacing:.1em;color:rgba(255,255,255,.7);padding:12px 0;border-bottom:1px solid var(--bd)}

/* ══ HERO ══ */
.hero{
  position:relative;height:100vh;min-height:680px;
  overflow:hidden;background:var(--hero-bg);
}
/* full-screen canvas */
#hero-canvas{
  position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;
}
/* dark gradient over canvas so text is readable */
.hero-overlay{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:
    linear-gradient(to right, rgba(5,16,10,.75) 35%, transparent 100%),
    linear-gradient(to top, rgba(5,16,10,.6) 0%, transparent 50%);
}
/* text: bottom-left */
.hero-content{
  position:absolute;bottom:10%;left:6%;z-index:3;max-width:660px;
}
.hero-eyebrow{
  font-family:var(--f-label);font-size:.72rem;letter-spacing:.42em;color:var(--gold);
  text-transform:uppercase;margin-bottom:22px;
  display:flex;align-items:center;gap:16px;
  opacity:0;animation:fadeIn .8s ease 1.8s forwards;
}
.hero-eyebrow::before{content:'';display:block;width:36px;height:1px;background:var(--gold)}
.hero-h1{
  font-family:var(--f-serif);font-weight:900;
  font-size:clamp(3.2rem,6.5vw,6rem);
  line-height:1.06;letter-spacing:-.02em;color:var(--text-hero);margin-bottom:24px;
}
.hero-line{overflow:hidden}
.hero-line-in{
  display:block;transform:translateY(105%);
  animation:lineUp 1s cubic-bezier(.16,1,.3,1) var(--d,0s) forwards;
}
@keyframes lineUp{to{transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}
.hero-h1 em{font-style:normal;color:var(--gold)}
.hero-body{
  font-family:var(--f-sans);font-weight:300;font-size:.88rem;line-height:2.3;
  color:rgba(234,228,214,.55);letter-spacing:.04em;margin-bottom:36px;
  opacity:0;animation:fadeIn .8s ease 1.4s forwards;
}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;opacity:0;animation:fadeIn .8s ease 1.6s forwards}
.btn-primary{
  padding:13px 30px;background:var(--gold);color:#05100A;
  font-family:var(--f-sans);font-size:.8rem;font-weight:700;letter-spacing:.12em;border-radius:2px;
  transition:background .2s,transform .2s;
}
.btn-primary:hover{background:var(--gold2);transform:translateY(-2px)}
.btn-ghost{
  padding:13px 26px;border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.7);font-family:var(--f-sans);font-size:.8rem;
  letter-spacing:.12em;border-radius:2px;
  transition:border-color .2s,color .2s;
}
.btn-ghost:hover{border-color:rgba(255,255,255,.6);color:#fff}
/* right-bottom credit */
.hero-credit{
  position:absolute;right:3%;bottom:4%;z-index:3;
  font-family:var(--f-label);font-size:.58rem;letter-spacing:.18em;
  color:rgba(255,255,255,.22);writing-mode:vertical-rl;text-orientation:mixed;
}
/* scroll indicator: center bottom */
.hero-scroll-indicator{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;
  padding-bottom:4px;
  opacity:0;animation:fadeIn .8s ease 2s forwards;
}
.scroll-line{
  width:1px;height:64px;
  background:linear-gradient(to bottom,rgba(255,255,255,.4),transparent);
  transform-origin:top;animation:scrollDrop 2.2s ease-in-out infinite;
}
@keyframes scrollDrop{
  0%{transform:scaleY(0);opacity:0}30%{opacity:1}100%{transform:scaleY(1);opacity:0}
}
.scroll-text{font-family:var(--f-label);font-size:.5rem;letter-spacing:.35em;color:rgba(255,255,255,.25);text-transform:uppercase}

/* ══ STATEMENT ══ */
.statement{background:var(--light-bg);padding:128px 0;text-align:center}
.statement-inner{max-width:700px;margin:0 auto;padding:0 40px}
.sec-eyebrow{font-family:var(--f-label);font-size:.8rem;letter-spacing:.3em;color:var(--text-muted);margin-bottom:24px}
.statement-h{font-family:var(--f-serif);font-size:clamp(1.7rem,3vw,2.5rem);font-weight:900;color:var(--text-body);line-height:1.4;letter-spacing:-.01em;margin-bottom:24px}
.statement-body{font-family:var(--f-sans);font-size:.9rem;line-height:2.3;color:var(--text-muted)}

/* ══ FARMER TABS ══ */
.farmer-tabs{
  position:sticky;top:var(--nav-h);z-index:80;
  background:rgba(13,26,15,.95);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--bd);
}
.farmer-tabs-scroll{
  display:flex;overflow-x:auto;scrollbar-width:none;
  padding:0 32px;
}
.farmer-tabs-scroll::-webkit-scrollbar{display:none}
.ftab{
  flex-shrink:0;padding:16px 20px;
  font-family:var(--f-sans);font-size:.72rem;letter-spacing:.09em;color:var(--text-sub);
  border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;
  transition:color .2s,border-color .2s;
}
.ftab:hover{color:var(--text-hero)}
.ftab.on{color:var(--gold);border-color:var(--gold)}

/* ══ FARMER SECTION ══ */
/* A: header */
.farmer-header{
  min-height:88vh;background:var(--dark);display:grid;grid-template-columns:1fr 1fr;
  align-items:center;overflow:hidden;position:relative;
}
.farmer-header::before{
  content:'';position:absolute;inset:0;
  background:var(--fgrad,linear-gradient(135deg,#0D1A0F,#152018));opacity:.55;
}
.farmer-header-text{padding:100px 64px;position:relative;z-index:2}
.farmer-region{font-family:var(--f-label);font-size:.8rem;letter-spacing:.25em;color:var(--text-sub);margin-bottom:20px}
.farmer-name-huge{
  font-family:var(--f-serif);font-weight:900;
  font-size:clamp(3rem,9vw,8rem);line-height:.95;
  color:var(--text-hero);letter-spacing:-.03em;margin-bottom:22px;
}
.farmer-tagline{font-family:var(--f-sans);font-size:.88rem;line-height:2;color:var(--text-sub);max-width:380px}
.farmer-header-vis{position:relative;z-index:2;display:flex;align-items:center;justify-content:center}
.farmer-header-vis svg{width:clamp(180px,26vw,360px);height:auto;opacity:.85;filter:drop-shadow(0 24px 70px rgba(0,0,0,.55))}
/* B: story */
.farmer-story{background:var(--light-bg);padding:96px 0}
.farmer-story-inner{max-width:660px;margin:0 auto;padding:0 40px}
.story-eyebrow{font-family:var(--f-label);font-size:.8rem;letter-spacing:.28em;color:var(--text-muted);margin-bottom:28px}
.story-para{font-family:var(--f-sans);font-size:.9rem;line-height:2.4;color:var(--text-muted);margin-bottom:18px}
/* C: stats */
.farmer-stats{background:var(--dark2);padding:72px 0;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.farmer-stats-inner{max-width:860px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:repeat(3,1fr)}
.stat-item{padding:0 32px;text-align:center;border-right:1px solid var(--bd)}
.stat-item:last-child{border-right:none}
.stat-num{font-family:var(--f-label);font-size:clamp(2.5rem,5vw,4rem);color:var(--gold);line-height:1}
.stat-unit{font-family:var(--f-sans);font-size:.62rem;letter-spacing:.12em;color:var(--text-sub);margin-top:4px}
.stat-label{font-family:var(--f-sans);font-size:.68rem;color:rgba(234,228,214,.35);margin-top:10px;letter-spacing:.06em}
/* D: products */
.farmer-products{background:var(--light-bg);padding:80px 0}
.farmer-products-inner{max-width:1100px;margin:0 auto;padding:0 48px}
.products-eyebrow{font-family:var(--f-label);font-size:.8rem;letter-spacing:.28em;color:var(--text-muted);margin-bottom:32px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
/* E: band */
.farmer-band{background:var(--gold);padding:52px 48px;text-align:center}
.band-quote{
  font-family:var(--f-serif);font-size:clamp(1.1rem,2.2vw,1.7rem);
  font-weight:700;color:#05100A;line-height:1.7;
}
.band-quote::before{content:'"\2009';opacity:.5}
.band-quote::after{content:'\2009"';opacity:.5}

/* ══ PRODUCT CARD ══ */
.pcard{background:#fff;border:1px solid var(--bdl);cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s}
.pcard:hover{transform:translateY(-4px);box-shadow:0 12px 44px rgba(28,22,10,.13)}
.pcard-img{height:190px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pcard-img svg{width:130px;height:130px;transition:transform .4s var(--ease)}
.pcard:hover .pcard-img svg{transform:scale(1.06)}
.pcard-body{padding:18px 18px 16px}
.pcard-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.badge{font-family:var(--f-sans);font-size:.56rem;font-weight:700;letter-spacing:.06em;padding:3px 7px;border-radius:1px}
.b-lim{background:rgba(163,44,64,.08);color:#A03040;border:1px solid rgba(163,44,64,.18)}
.b-new{background:rgba(26,76,30,.06);color:#1A4C1E;border:1px solid rgba(26,76,30,.16)}
.b-gift{background:rgba(196,154,48,.1);color:#8A6010;border:1px solid rgba(196,154,48,.2)}
.b-season{background:rgba(26,76,30,.06);color:#1A4C1E;border:1px solid rgba(26,76,30,.12)}
.pcard-name{font-size:.92rem;font-weight:700;line-height:1.45;color:var(--text-body);margin-bottom:14px}
.pcard-foot{display:flex;align-items:center;justify-content:space-between}
.pcard-price{font-size:1.02rem;font-weight:800;color:var(--text-body)}
.pcard-price small{font-size:.6rem;font-weight:400;color:var(--text-muted);margin-left:3px}
.pcard-unit{font-size:.62rem;color:var(--text-muted);margin-top:2px}
.pcard-add{width:30px;height:30px;border-radius:50%;border:1px solid var(--bdl);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--text-muted);transition:all .2s}
.pcard-add:hover{background:#1A4C1E;border-color:#1A4C1E;color:#fff}
.pcard-add:disabled{opacity:.3;cursor:not-allowed}

/* ══ CALENDAR ══ */
.calendar-section{background:var(--dark);padding:96px 0}
.cal-inner{max-width:1100px;margin:0 auto;padding:0 48px}
.section-h2{font-size:clamp(1.6rem,2.5vw,2.2rem);font-weight:900;color:var(--text-hero);margin-bottom:48px}
.cal-wrap{overflow-x:auto}
.cal-table{border-collapse:collapse;width:100%;min-width:740px}
.cal-table th{padding:8px 6px;font-family:var(--f-sans);font-size:.6rem;font-weight:500;letter-spacing:.1em;color:var(--text-sub);text-align:center;border-bottom:1px solid var(--bd)}
.cal-table th.now{color:var(--gold)}
.cal-table td{padding:10px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.cal-table td.now{background:rgba(196,154,48,.05)}
.cal-name{text-align:left!important;padding:10px 16px!important;font-size:.76rem;font-weight:700;color:var(--text-hero);white-space:nowrap}
.cal-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
.cal-dot.on{animation:dotpls 2.5s ease-in-out infinite}
@keyframes dotpls{0%,100%{opacity:.65}50%{opacity:1;transform:scale(1.28)}}

/* ══ JOIN CTA ══ */
.join-section{background:var(--dark2);padding:120px 0;text-align:center;border-top:1px solid var(--bd)}
.join-inner{max-width:600px;margin:0 auto;padding:0 40px}
.join-h{font-size:clamp(1.8rem,3vw,2.8rem);font-weight:900;color:var(--text-hero);margin-bottom:16px}
.join-sub{font-family:var(--f-sans);font-size:.88rem;line-height:2.2;color:var(--text-sub);margin-bottom:40px}
.btn-outline{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;border:1px solid var(--gold);color:var(--gold);
  font-family:var(--f-sans);font-size:.8rem;font-weight:700;letter-spacing:.1em;border-radius:2px;
  transition:background .2s,color .2s;
}
.btn-outline:hover{background:var(--gold);color:#05100A}

/* ══ FOOTER ══ */
footer{background:var(--hero-bg);padding:72px 48px 40px;border-top:1px solid var(--bd)}
.footer-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:40px;margin-bottom:56px}
.footer-logo-name{font-family:var(--f-label);font-weight:900;font-size:1.4rem;letter-spacing:.2em;color:var(--text-hero)}
.footer-logo-sub{font-family:var(--f-label);font-size:.58rem;letter-spacing:.2em;color:var(--text-sub);margin-top:6px}
.footer-links{display:flex;gap:48px;flex-wrap:wrap}
.footer-group label{font-family:var(--f-sans);font-size:.55rem;font-weight:700;letter-spacing:.24em;color:rgba(234,228,214,.2);text-transform:uppercase;display:block;margin-bottom:14px}
.footer-group a{display:block;font-family:var(--f-sans);font-size:.75rem;color:var(--text-sub);margin-bottom:9px;transition:color .2s;cursor:pointer}
.footer-group a:hover{color:var(--text-hero)}
.footer-btm{font-family:var(--f-sans);font-size:.62rem;color:rgba(234,228,214,.18);text-align:center;padding-top:28px;border-top:1px solid var(--bd)}

/* ══ CART MODAL ══ */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.modal-bg.open{opacity:1;visibility:visible}
.cart-box{background:var(--dark2);border:1px solid var(--bd);width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(20px);transition:transform .3s var(--ease)}
.modal-bg.open .cart-box{transform:translateY(0)}
.cart-head{padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.cart-title{font-size:.96rem;font-weight:700;color:var(--text-hero)}
.cart-close{width:28px;height:28px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:.82rem;color:var(--text-sub);transition:background .2s}
.cart-close:hover{background:rgba(255,255,255,.12)}
.cart-list{flex:1;overflow-y:auto;padding:16px 24px}
.cart-empty{text-align:center;padding:40px;color:var(--text-sub);font-family:var(--f-sans);font-size:.84rem}
.cart-row{display:flex;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--bd)}
.cart-row-img{width:52px;height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd);background:var(--dark)}
.cart-row-img svg{width:38px;height:38px}
.cart-row-name{font-size:.8rem;font-weight:700;color:var(--text-hero);margin-bottom:3px}
.cart-row-price{font-size:.72rem;color:var(--text-sub)}
.cart-row-ctrl{display:flex;align-items:center;gap:8px;margin-left:auto}
.cqb{width:22px;height:22px;border-radius:50%;border:1px solid var(--bd);background:var(--dark);font-size:.76rem;display:flex;align-items:center;justify-content:center;color:var(--text-sub);transition:background .2s}
.cqb:hover{background:rgba(255,255,255,.1)}
.cqn{font-size:.82rem;font-weight:700;color:var(--text-hero);min-width:18px;text-align:center}
.cart-foot{padding:16px 24px;border-top:1px solid var(--bd)}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total-lbl{font-family:var(--f-sans);font-size:.78rem;color:var(--text-sub)}
.cart-total-num{font-size:1.2rem;font-weight:800;color:var(--text-hero)}
.checkout-btn{width:100%;padding:13px;background:var(--gold);color:#05100A;font-family:var(--f-sans);font-weight:700;font-size:.84rem;letter-spacing:.08em;border-radius:2px;transition:background .2s}
.checkout-btn:hover{background:var(--gold2)}

/* ══ PRODUCT DETAIL ══ */
.detail-page{min-height:100vh;background:var(--hero-bg);padding-top:var(--nav-h)}
.detail-hero{background:var(--dark);padding:72px 0;border-bottom:1px solid var(--bd)}
.detail-hero-inner{max-width:1100px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.detail-illus{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;overflow:hidden}
.detail-illus svg{width:65%;height:65%}
.detail-bc{display:flex;gap:8px;align-items:center;font-family:var(--f-sans);font-size:.68rem;color:var(--text-sub);margin-bottom:24px}
.detail-bc a{cursor:pointer;transition:color .2s}
.detail-bc a:hover{color:var(--text-hero)}
.detail-bc span{opacity:.4}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.detail-title{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;line-height:1.2;color:var(--text-hero);margin-bottom:10px}
.detail-origin{font-family:var(--f-sans);font-size:.78rem;color:var(--text-sub);margin-bottom:22px}
.detail-price{font-size:2rem;font-weight:900;color:var(--gold)}
.detail-price small{font-size:.72rem;font-weight:400;color:var(--text-sub);margin-left:5px}
.detail-unit{font-family:var(--f-sans);font-size:.78rem;color:var(--text-sub);margin-bottom:18px}
.stock-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-sans);font-size:.72rem;font-weight:700;padding:5px 11px;border-radius:2px;margin-bottom:22px}

.sb-lim{background:rgba(163,44,64,.12);color:#A03040}
.sb-out{background:rgba(255,255,255,.06);color:var(--text-sub)}
.sb-pre{background:rgba(196,154,48,.12);color:var(--gold)}
.detail-appeal{font-family:var(--f-sans);font-size:.84rem;line-height:2;color:var(--text-sub);padding:14px 16px;border-left:2px solid var(--gold);margin-bottom:24px}
.season-bar-lbl{font-family:var(--f-sans);font-size:.7rem;color:var(--text-sub);margin-bottom:8px}
.season-months{display:flex;gap:4px;margin-bottom:4px}
.sm-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px}
.sm-bar.on{background:var(--gold)}
.sm-bar.now{outline:2px solid rgba(196,154,48,.5);outline-offset:2px}
.sm-labels{display:flex;gap:4px;margin-bottom:22px}
.sm-lbl{flex:1;text-align:center;font-family:var(--f-sans);font-size:.42rem;color:var(--text-sub)}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.qty-lbl{font-family:var(--f-sans);font-size:.74rem;color:var(--text-sub)}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--bd);overflow:hidden}
.qbtn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--dark2);color:var(--text-sub);font-weight:700;transition:background .2s}
.qbtn:hover{background:var(--dark)}
.qnum{width:42px;height:34px;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--bd);border-right:1px solid var(--bd);font-weight:700;color:var(--text-hero)}
.add-to-cart{width:100%;padding:14px;background:var(--gold);color:#05100A;font-family:var(--f-sans);font-size:.9rem;font-weight:700;letter-spacing:.08em;border-radius:2px;margin-bottom:14px;transition:background .2s,transform .2s}
.add-to-cart:hover{background:var(--gold2);transform:translateY(-2px)}
.add-to-cart:disabled{opacity:.35;transform:none;cursor:not-allowed}
.detail-body{background:var(--light-bg);padding:72px 0}
.detail-body-inner{max-width:1100px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:1fr 1fr;gap:64px}
.detail-tabs{display:flex;border-bottom:1px solid var(--bdl);margin-bottom:20px}
.dtab{padding:10px 16px;font-family:var(--f-sans);font-size:.74rem;font-weight:600;letter-spacing:.05em;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s}
.dtab:hover{color:var(--text-body)}
.dtab.on{color:#1A4C1E;border-color:#1A4C1E}
.dtab-pane{display:none}
.dtab-pane.on{display:block}
.dtab-text{font-family:var(--f-sans);font-size:.84rem;line-height:2.1;color:var(--text-muted)}

.spec-lbl{color:var(--text-muted);font-weight:600}
.spec-val{color:var(--text-body)}
.howto-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--cream);margin-bottom:6px;font-family:var(--f-sans);font-size:.76rem;color:var(--text-muted)}
.howto-item::before{content:'◆';color:#1A4C1E;font-size:.4rem;flex-shrink:0}
.dfc{padding:20px;border:1px solid var(--bdl);cursor:pointer;transition:border-color .2s;background:#fff}
.dfc:hover{border-color:#1A4C1E}
.dfc-top{display:flex;gap:14px;align-items:center;margin-bottom:10px}
.dfc-illus{width:52px;height:52px;flex-shrink:0;border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.dfc-illus svg{width:52px;height:52px}
.dfc-name{font-size:.9rem;font-weight:700;color:var(--text-body);margin-bottom:2px}
.dfc-pref{font-family:var(--f-sans);font-size:.68rem;color:var(--text-muted)}
.dfc-catch{font-family:var(--f-sans);font-size:.78rem;color:var(--text-muted);line-height:1.9;font-style:italic}

[data-reveal]{opacity:0;transition:opacity .85s var(--ease),transform .85s var(--ease)}
[data-reveal]:not([data-dir]){transform:translateY(28px)}
[data-reveal][data-dir=left]{transform:translateX(-46px)}
[data-reveal][data-dir=right]{transform:translateX(46px)}
[data-reveal].vis{opacity:1;transform:translate(0)}

  .detail-hero-inner,.detail-body-inner{grid-template-columns:1fr;padding:0 24px;gap:28px}
  .detail-illus{display:none}
  footer{padding:48px 24px 32px}
  .farmer-tabs-scroll{padding:0 20px}
  #nav{padding:0 20px}
}

class VegetableParticles{

    this.dpr=window.devicePixelRatio||1;
    this.particles=[];
    this.vi=0;
    this.keys=['corn','strawberry','potato','onion','grape','peach','egg'];
    this.state='idle';this.frameId=null;this._stop=false;
  }
  async sampleSVG(str){
    const size=Math.round(Math.min(this.W,this.H)*.55);
    const blob=new Blob([str],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});
    URL.revokeObjectURL(url);
    const off=Object.assign(document.createElement('canvas'),{width:size,height:size});
    const oc=off.getContext('2d');
    oc.drawImage(img,0,0,size,size);
    const data=oc.getImageData(0,0,size,size).data;
    const pts=[];
    const step=Math.max(3,Math.round(size/90));
    const ox=(this.W-size)/2,oy=(this.H-size)/2;
    for(let y=0;y<size;y+=step)for(let x=0;x<size;x+=step){
      const i=(y*size+x)*4;
      if(data[i+3]>100)pts.push({tx:ox+x,ty:oy+y,r:data[i],g:data[i+1],b:data[i+2]});
    }
    return pts;
  }
  initParticles(pts){
    this.particles=pts.map(p=>({
      x:Math.random()*this.W,y:Math.random()*this.H,
      tx:p.tx,ty:p.ty,
      vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,
      color:`${p.r},${p.g},${p.b}`,
      sz:(0.7+Math.random()*1.6)*this.dpr,
      life:1,
    }));
  }
  update(){
    const s=this.state,ps=this.particles;
    if(s==='forming'){
      ps.forEach(p=>{
        const dx=p.tx-p.x,dy=p.ty-p.y;
        p.vx+=dx*.075;p.vy+=dy*.075;p.vx*=.82;p.vy*=.82;
        p.x+=p.vx;p.y+=p.vy;
      });
    }else if(s==='formed'){
      ps.forEach(p=>{
        p.vx+=(Math.random()-.5)*.2;p.vy+=(Math.random()-.5)*.2;
        p.vx*=.9;p.vy*=.9;p.x+=p.vx;p.y+=p.vy;
      });
    }else if(s==='dissolving'){
      ps.forEach(p=>{
        p.vx+=(Math.random()-.5)*4;p.vy+=-1+(Math.random()-.5)*3;
        p.vx*=.97;p.vy*=.97;p.x+=p.vx;p.y+=p.vy;p.life-=.014;
      });
    }
  }
  draw(){
    const{ctx,W,H,state,particles}=this;
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      const a=state==='dissolving'?Math.max(0,p.life):.88;
      if(a<=0)return;
      ctx.globalAlpha=a;
      ctx.fillStyle=`rgb(${p.color})`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
  }
  async runCycle(){
    if(this._stop)return;
    const key=this.keys[this.vi];
    const str=SVG[key]?.(300);if(!str)return;
    try{
      const pts=await this.sampleSVG(str);if(this._stop)return;
      this.initParticles(pts);
      this.state='forming';await delay(2600);if(this._stop)return;
      this.state='formed';await delay(2600);if(this._stop)return;
      this.state='dissolving';await delay(1600);if(this._stop)return;
    }catch(e){console.warn(e);}
    this.vi=(this.vi+1)%this.keys.length;
    this.runCycle();
  }
  start(){
    const loop=()=>{if(this._stop)return;this.update();this.draw();this.frameId=requestAnimationFrame(loop);};
    loop();this.runCycle();
  }
  stop(){this._stop=true;if(this.frameId)cancelAnimationFrame(this.frameId);}
}

const NOW_MONTH=new Date().getMonth()+1;
function isInSeason(s,m=NOW_MONTH){return s.start<=s.end?m>=s.start&&m<=s.end:m>=s.start||m<=s.end;}
function fmtPrice(n){return'¥'+n.toLocaleString('ja-JP');}
function stockLabel(s){return{in_stock:'在庫あり',limited:'残りわずか',out_of_stock:'在庫なし',pre_order:'予約受付中'}[s]||s;}
function seasonRange(s){const m=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];return`${m[s.start-1]}〜${m[s.end-1]}`;}

/* ══════════════ CART ══════════════ */
const Cart={
  KEY:'sen_v3',items:[],
  load(){try{this.items=JSON.parse(localStorage.getItem(this.KEY))||[];}catch{this.items=[];}this.updateBadge();},
  save(){localStorage.setItem(this.KEY,JSON.stringify(this.items));},
  add(id,qty=1){const x=this.items.find(i=>i.id===id);if(x)x.qty+=qty;else this.items.push({id,qty});this.save();this.updateBadge();this.animateBadge();},
  remove(id){this.items=this.items.filter(i=>i.id!==id);this.save();this.updateBadge();this.renderItems();},
  update(id,qty){if(qty<=0){this.remove(id);return;}const x=this.items.find(i=>i.id===id);if(x)x.qty=qty;this.save();this.updateBadge();this.renderItems();},
  total(){return this.items.reduce((s,i)=>s+(PRODUCTS[i.id]?.price||0)*i.qty,0);},
  count(){return this.items.reduce((s,i)=>s+i.qty,0);},
  updateBadge(){const c=this.count(),b=document.getElementById('cart-badge');if(!b)return;b.textContent=c;b.classList.toggle('vis',c>0);},
  animateBadge(){const b=document.getElementById('cart-badge');if(!b)return;b.classList.remove('bump');void b.offsetWidth;b.classList.add('bump');},
  renderItems(){
    const list=document.getElementById('cart-items'),tot=document.getElementById('cart-total');
    if(!list)return;
    if(!this.items.length){list.innerHTML='<div class="cart-empty">カートは空です</div>';if(tot)tot.textContent='¥0';return;}
    list.innerHTML=this.items.map(item=>{
      const p=PRODUCTS[item.id];if(!p)return'';
      return`<div class="cart-row"><div class="cart-row-img">${getIllus(p.illustrationType,52)}</div>
      <div><div class="cart-row-name">${p.shortName}</div><div class="cart-row-price">${fmtPrice(p.price)} / ${p.unit}</div></div>
      <div class="cart-row-ctrl">
        <button class="cqb" onclick="Cart.update('${item.id}',${item.qty-1})">−</button>
        <span class="cqn">${item.qty}</span>
        <button class="cqb" onclick="Cart.update('${item.id}',${item.qty+1})">＋</button>
      </div></div>`;
    }).join('');
    if(tot)tot.textContent=fmtPrice(this.total());
  }
};

/* ══════════════ REVEAL ══════════════ */
function initReveal(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{if(!e.isIntersecting)return;setTimeout(()=>e.target.classList.add('vis'),i*55);obs.unobserve(e.target);});
  },{threshold:.12});
  document.querySelectorAll('[data-reveal]:not(.vis)').forEach(el=>obs.observe(el));
}

/* ══════════════ FARMER TABS ══════════════ */
function initFarmerTabs(){
  const secs=document.querySelectorAll('.farmer-section');
  const tabs=document.querySelectorAll('.ftab');
  if(!secs.length||!tabs.length)return;
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){const id=e.target.id.replace('farmer-','');tabs.forEach(t=>t.classList.toggle('on',t.dataset.fid===id));}
    });
  },{threshold:.3,rootMargin:`-${72+44}px 0px 0px 0px`});
  secs.forEach(s=>obs.observe(s));
}

/* ══════════════ NAV SCROLL ══════════════ */
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('solid',window.scrollY>10);
},{passive:true});

/* ══════════════ MOBILE MENU ══════════════ */
function toggleMobileMenu(){document.getElementById('mobile-menu').classList.toggle('open');}
function closeMobileMenu(){document.getElementById('mobile-menu').classList.remove('open');}

/* ══════════════ ROUTING ══════════════ */
function navigate(path){location.hash=path;}
function goHome(anchorId){
  const hash=(location.hash||'').replace('#','');
  if(hash.startsWith('product/')){
    history.replaceState(null,'','#home');
    window.scrollTo(0,0);
    renderHome();
    if(anchorId)setTimeout(()=>scrollToId(anchorId),500);
  }else{
    if(anchorId)scrollToId(anchorId);else window.scrollTo({top:0,behavior:'smooth'});
  }
}
function scrollToId(id){
  const el=document.getElementById(id);
  if(el){el.scrollIntoView({behavior:'smooth',block:'start'});}
}

function router(){
  const hash=(location.hash||'#home').replace('#','');
  if(hash.startsWith('product/')){
    window.scrollTo(0,0);
    renderDetail(hash.split('/')[1]);
  }else{
    const needRender=!document.querySelector('.hero')||!!document.querySelector('.detail-page');
    if(needRender){
      window.scrollTo(0,0);
      renderHome();
      if(hash&&hash!=='home')setTimeout(()=>scrollToId(hash),500);
    }else{
      if(hash&&hash!=='home')setTimeout(()=>scrollToId(hash),100);
    }
  }
}
window.addEventListener('hashchange',router);

/* ══════════════ CART MODAL ══════════════ */
function openCart(){Cart.renderItems();document.getElementById('cart-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeCart(){document.getElementById('cart-overlay').classList.remove('open');document.body.style.overflow='';}

/* ══════════════ INIT ══════════════ */
window.addEventListener('DOMContentLoaded',()=>{
  Cart.load();
  buildNavDrop();
  setTimeout(()=>{
    document.getElementById('loader').classList.add('out');
    renderHome();
  },1500);
});
</script>
